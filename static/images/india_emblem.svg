<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Base / plinth -->
  <rect x="20" y="118" width="80" height="10" rx="3" fill="#003366"/>
  <!-- Abacus bar -->
  <rect x="15" y="108" width="90" height="12" rx="3" fill="#003366"/>

  <!-- Dharma Chakra (wheel) -->
  <circle cx="60" cy="68" r="38" fill="none" stroke="#003366" stroke-width="3"/>
  <circle cx="60" cy="68" r="6"  fill="#003366"/>
  <!-- 24 spokes -->
  <g stroke="#003366" stroke-width="1.5">
    <line x1="60" y1="30" x2="60" y2="62"/>
    <line x1="60" y1="74" x2="60" y2="106"/>
    <line x1="22" y1="68" x2="54" y2="68"/>
    <line x1="66" y1="68" x2="98" y2="68"/>
    <line x1="33" y1="38" x2="56" y2="62"/>
    <line x1="64" y1="74" x2="87" y2="98"/>
    <line x1="87" y1="38" x2="64" y2="62"/>
    <line x1="56" y1="74" x2="33" y2="98"/>
    <line x1="22.5" y1="50" x2="52" y2="64"/>
    <line x1="68" y1="72" x2="97.5" y2="86"/>
    <line x1="97.5" y1="50" x2="68" y2="64"/>
    <line x1="52" y1="72" x2="22.5" y2="86"/>
    <line x1="38" y1="34" x2="57" y2="63"/>
    <line x1="63" y1="73" x2="82" y2="102"/>
    <line x1="82" y1="34" x2="63" y2="63"/>
    <line x1="57" y1="73" x2="38" y2="102"/>
    <line x1="25" y1="58" x2="55" y2="66"/>
    <line x1="65" y1="70" x2="95" y2="78"/>
    <line x1="95" y1="58" x2="65" y2="66"/>
    <line x1="55" y1="70" x2="25" y2="78"/>
    <line x1="29" y1="44" x2="55" y2="65"/>
    <line x1="65" y1="71" x2="91" y2="92"/>
    <line x1="91" y1="44" x2="65" y2="65"/>
    <line x1="55" y1="71" x2="29" y2="92"/>
  </g>

  <!-- Lions (simplified silhouettes) -->
  <!-- Left lion -->
  <ellipse cx="38" cy="105" rx="10" ry="6" fill="#003366"/>
  <circle  cx="32" cy="100" r="6"         fill="#003366"/>
  <ellipse cx="30" cy="96"  rx="5" ry="4" fill="#003366"/>
  <!-- Right lion -->
  <ellipse cx="82" cy="105" rx="10" ry="6" fill="#003366"/>
  <circle  cx="88" cy="100" r="6"         fill="#003366"/>
  <ellipse cx="90" cy="96"  rx="5" ry="4" fill="#003366"/>
  <!-- Centre lion (facing front) -->
  <ellipse cx="60" cy="103" rx="9" ry="6" fill="#003366"/>
  <circle  cx="60" cy="96"  r="7"         fill="#003366"/>
  <ellipse cx="60" cy="92"  rx="6" ry="4" fill="#003366"/>

  <!-- Motto band -->
  <rect x="15" y="119" width="90" height="10" rx="2" fill="#003366"/>
  <text x="60" y="127" text-anchor="middle" font-family="Devanagari,serif" font-size="7"
        fill="white" letter-spacing="1">सत्यमेव जयते</text>
</svg>
